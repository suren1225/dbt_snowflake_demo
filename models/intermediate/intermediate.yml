version: 2

models:

  - name: int_order_details
    description: Order details enriched with customer and product attributes

    columns:

      - name: order_id
        tests:
          - not_null

      - name: customer_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: sales_amount
        tests:
          - not_null

      - name: profit
        tests:
          - not_null